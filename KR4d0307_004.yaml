body:
  text: 方泉詩集卷四宋周文璞撰瞿塘神君歌黃衫紗帽佳少年炯然餓虎窮山淵不居秦鹿祖龍畔却走碧雞金馬邉左手斜執巨靈鑿右手敬抱禹貢篇離堆順流已受命一下不打天吳鞭有時挾彈暮雲表有時蹴踘春風前有時却自著絳帕走入藥市尋神仙為人定似李太白學道定似葛稚川孫翁走避乖崖叟遣僕送畫不取錢神君廟食與畫像千古萬古當流傳我昔夢上神君殿偶值蓬萊衆真晏洛陽開盡姚黃花銅駝陌上難相見清明日書事蒼辨一如楚執圭思想越吟身自低澗水又如古智士縱橫流轉多滑稽雜花半開已倐落如怨曠女離深閨幽禽自呼復相命如遣逐魄傷窮棲而我自是不羈者行行踏破青萋萋今回蕩槳苕霅溪與野老輩相扶携園池亭墅逰歷遍自對蜀錦傾偏題興闌徑走歸茅舍同沃浮蟻烹村雞百五之後最寥閴獨過趙灣西更西野夫不知時節晚但要熟醉如春泥雲根雲從㑹稽生旦旦見伯禹聼讀山海經成龍不成虎禹命雲歸與可向蕺山去昻昻王內史眉宇照今古常在此盤旋深藏無處所王孫江海人雲根自栖翥招遊玉葉來以石為伴侣既從衣上浮只就茶裏煮不入晋家池肯作秦望雨兩儒一攴郎不學世間語吳傖哦五字坎壈酸澀苦併送山中人約束雲下取聼琴向人欲抱舜文絃可惜書生不值錢彈出履霜空作惡一林風露已鳴蟬寄友人流落他鄉鎩羽翰半年寧復記悲歡夜傳樓鼓思城角朝見江船念客鞍不恨形骸老閭里遂令唇舌滿長安寄聲好在文章友目送春雲自倚欄雨雨意遽如許雲容亦可憐聲聲總腸斷滴滴更勻圓道院燒香地山房焙荈天故園無恙否潤色到瓜田隂山隂山祠下月如霜不為吟園斷殺腸折得燈花無處賞帶枝分與棹船郎新亭諸君收淚已無言烟外中原草色昏老子歸來坐廊廟短轅車上欲消魂法寶寺細竹千竿殿影斜龍顔曽此著袈裟寺樓杳杳鐘聲度疑有宫娥出晚花戒壇相君孫女小乘僧身入祗園佛律行三級戒壇秋色冷箇中螻蟻亦長生桓野王畫像匡床三弄清溪笛嘆息欷歔太極筝惆悵斯人風味減江花江草不勝情玉晨觀二首野笋衝泉出山花避石開余方有公事不為等閒來羽扇臨𤣥寺霓衣上醮壇九枝松葉冷千葉杏花殘寒食有感三首生平參道術師事大茅翁持鑰開金匱焚香立玉童黃麟來地上朱鯉出江中今在桁楊畔依依睡晚風清明好時節傲吏小詩家失意因流水傷心為落花人歸知市靜日落見山斜明日三叉路村醪亦自佳亭午步江皋誰云命不遭愛風吹蛺蝶怕雨爛櫻桃鑽火烹新乳槌門覔小槽今年竒事少塵滿舊征袍桂偶向花邉立懸知病已瘳小山今夜月團樹滿庭秋清露霑叢底斜河在上頭須臾香更好還與碧雲浮自笑自笑蕭條甚微吟坐到昏江風來掃地山鳥見開門茶面龍頭縮花梢犢鼻溫一從杯酒少不復過深村檇李道中二首吹徹鵝笙醉碧桃古城斜石冷輕舠此行意著經行處緑樹黃桑一樣高卧龍山下聼吟松細雨清明似夢中柳䕃朱欄三百尺渴烏猶自泣春風梅梁歌文命殿角東北左上有梅梁鐡交鎖傳聞舊時枝葉生木質鱗身無不可有時𤣥練離朱拱歸帶濕萍光欲動低頭下吸菲嶺泉奮髯直入陽明洞旁觀但怪香火濃頃刻即令風雨送爾不見飢烏啄鼓來饋食走入嵩高化為石禨祥禍福儻或是隂陽幻變誰能測玉笥觀掛白玉梁含元遺下流血柱異事茍逢博物問後來那得詳其故卷丹雲凝素霧玉簫九成奠雕爼登歌升降只仰俯嗚呼梅梁忽飛去題邊女騎燕山雪花一尺飛邊女結隊夜打圍海東青過流沙西黃頭郎主獨自歸創殘狐兔懸氈車疲􅉵鷹犬聞笳悲君不見自從石晋納書欵白溝河漘作邉面東陽道中野店梢頭起竈烟江雲弄色半晴天暗泉繞砌喧人語逺燒侵林照客韉晚日未牧雞上樹春風欲度鳥耘田布帆無恙歸心穩才到家山又迫年鳯門泉石根兩眼北流泉乳竇潛通御井邉飄出宫花人不識又沿衰草下山泉賞春二首滿酌黃封都市酒斜簮縹蒂御園花半酣更乞跳珠水獨對風爐自煮茶賞春社裏鼓逢逢尚恨聲同調不同我亦明朝苦無事更來吹笛亂山中春懷棠梨未落柳絲長斜望幽人作斷腸已自不堪田父飲更能重入少年場山連莽莽荒陂白門掩蕭蕭野日黃想得故園踈雨外樽前催拍杜韋娘暮雨暮雨瀟瀟郎不歸樽前誰憶舊歌詞望夫烏臼濃於染葉葉驚秋恨欲飛即事二首樂使金花鼓蠻衣紫金鞍蕃官船過界驛吏報平安龍護朝元閣鶴棲封禪臺中原垂白叟只望羽書來題堯章新成山堂早將心事付漁樵若被幽人苦見招多種竹將挑笋喫旋栽松待斫柴燒壁間古畫身都碎架上枯琴尾半焦猶有住山窮活計仙經盈卷一村瓢題羅申之騾綱圖昔日三郎騎爾祖廟食太小可辛苦後來﨑嶇蜀棧間棄置龍媒復親汝深山古木雪漫漫險途十步九步艱綱頭呪囑弗損折要爾助軍身補官贈相士丁日宣張公謂余可神仙薛顛謂余可英傑丁生謂二皆無成世間安有此竒絶麒麟閣上冠貂蟬龍虎鼎中治大丹興來一笑掃塵障回首已自升雲端何如只向松江渡楊柳影邉茅屋住卧看蒼虬挾白雲卷取秋濤過江去弔黥卒吾作窮竒白下囚汝披短褐從吾遊蔣侯廟畔沽春酒周處堂邉送客舟械欲破時應日慘命將絶處亦天愁江陵柳大如知此對著官軍輒淚流楊孟博挽詞向來洛下老書生今見諸生更老成不復秀才趍試院已題文學上銘旌泛觀今古人亡恨只有英雄命莫爭來弔不聞妻子苦依然認作讀書聲贈隱者袁二柳大劉草八長到先生卜肆邉便拜逸妻為㛐氏更沽春酒作家筵山公馬在何須爾林屋丹成亦偶然獨此老身無籍賴為他人擲卦爻錢劍客行燕雲飛騎著柘黃仁人烈士集太行已聞泣涕拜明詔共挾金輿歸大梁安得山人一雙劍走入雲中看不見人間夜半風雨時郅都首奏延和殿我生四十無所成荆淮好漢為知音丈夫志在仁義耳麟閣貂冠非本心功成劍化兩龍去我亦變名入烟霧此時再拜康山人九霄客星在何處書事說戰猶能聼聞尸不忍過役人愁似鬼病馬瘦於駝甚欲參經緯其誰出揣摩中原有遺老亡奈檄書何見泗州降者才自降軍便守邉大家齊數中興年姑蘇寺裏相逢處為爾呻吟一悵然感興七言三首寥寥古意少人傳莫為薰琴只五絃夫子縱心方學易我曹何意便談𤣥神馳洙泗身將老望斷沅湘眼欲穿月白風清如此夜阿郎不肯上鈞天在家莫羡出家僧擾擾營營竟未曽相國舟中龍奪劍山人琴畔鬼吹燈從來不肯尋真訣更自無心學大乘漢室諸公鳴玉佩也須還我一枝藤夜夜推敲學苦吟一如煆錬假黃金石間真隱何時出地下狂魂無處尋􅍦鶴尚知長袖舞哀猿空作斷腸音故墟杞菊今何似桂落小山春水深題天童全老天童寶樓閣銅釘敞朱扉一老燒香後諸禪乞食歸天聼塗毒鼓神捧苾芻衣說了村夫偈依然入翠微送人之金陵江山不逐寒潮晚陸墓猶含古木春君入臺城須訪問箇中定有六朝人送逸人歸茅洞三君乘白鵠各在一山椒子去穿茅洞人方採藥苖花連雲氣近松轉水程遙想得尋幽侣空歌散午朝中秋日遊能仁北寺兩剎輕雲漠漠烟漫漫杖藜扶行不作難無量壽佛像最古未曽有經碑亦殘秋花泫露顔色好客子著雨衣裳單題詩寫寄莓苔壁勿使俗人相對看贈虎丘僧道輝遊天台二首世讃碑文換穹龜上緑苔琵琶不可聼樓閣更堪哀竹動禪僧入梅香凍雀回開函翻內典日晚未歸來少小即精勤參禪復著文香勳滬瀆像茶酹武丘墳入定山猿見吟詩海鶴聞幽情正迢遞又拜石橋雲西湖即事閒看浮鷗棲曲渚倦隨奔鹿上荒陵松門雨過長廊靜一架藤花供病僧宫人斜魂魄凄凉掩暮塵野花山葉自精神年年中使頭邉過暗裏相看似路人上強寺方池流水碧溶溶惆悵靈蛇不易逢門外行人常立看一株唐末半枯松太湖太湖我汚池茂苑我林莽橘柚我堆盤鱸魚我登俎區區為蘋花移去溪上住終當賦歸歟來此卧烟雨寫懷二首吾聞唐諸僧往往多人傑有携至嵓廊可並䕫稷契偉哉寒山子拾菜衣百結其文似離騷但自寫木葉往時陸荆門自是天下雄徒𨽻解散盡何處尋樊翁遂令一世士默默逃虛空至今大堤上葉葉皆春風九溪十八澗九溪十八澗冷見漾青苔洗足書僧石臨流客放杯案頭松葉響身畔野花開百六辭歌吹清逰始一回弔辨才二首讀了碑文讀祭詩冷看遺像立多時郎當嶺上生雲處山鳥山花憶老師坡使參寥滴奠茶定將老淚濕雲霞誰知走入靈山隊又對閒人說法華西湖小隱先帝何曾寵幸臣家園籍沒幾經春一丘賜與嬋娟魄教主西湖似洛神麯坊麯坊才盡上湖船笑問雲山覔酒錢兩岸柳絲黃不斷不知身在御園邉壽星寺聞子規二首子規欲歸歸未得啼向錢王壽星石月明血盡人不知只怪曉山深似碧莫向空山惱病僧暮雲臺殿異鄉人多時不識巴江路守著濃花哭過春分夢泉偷得兩泓清同他猿鳥喫上下泉邉身上下床上客相對各相忘山中小花白隱者居密竹緣坡便當籬野泉入户自成池床頭一卷麻衣易更有寒山拾得詩逸士墳魂歸魄散兩逍遙小小丘亭慰寂寥守墓未須藝宿草白蟾方護紫芝苗夏日偶題溪友相呼上釣舟藕花菱葉思悠悠好詩已在前山寺寫放參寥石井頭謝頥師見過雲卷道者方晝睡有僧奚為入桑杞惠然相過窮壑底共談儒流佛宗㫖二家之風亦頽靡吹而揚之誰為起寒灰煨芋香透紙呼童就鄰一賖米作糜煮菜相料理吾窮於世無比擬殷勤相覔有吾子謾書七字聊送似往共天嬪泣山鬼望茅山六言三首羽衣藥叟歡迎手執蘭花共行從此十年不調可能久視長生其二昔年唱采芝歌已老頭顱奈何不見飇輪碾處白雲出沒常多其三蔣家兄弟清古著書𤣥相推宗摶土劃沙戲劇穿岡度嶺從容寄山中道友三首玉函捧上五雲堆著意通幽此一回三十年來增悵望更無人上望仙臺匆匆山信寄來時中有黃庭七字詩已死華顛無覔處幾回吹斷玉參差憶得尋山復出山緑楊時候暮春間至今只有逰仙夢長與松風自往還初營鳯山香草參差種幽花逐旋移既添醒酒石須著放生池春在年年好山來處處竒吹簫吾不解長嘯却相宜梅谷香㷔雲頭玉雪身緩行微咏岸烏巾始從谷裏看修竹却向水邉逢麗人客子去時方得月嶺猿啼後更無春鳯凰欲下簫聲緊狼藉瀛州萬斛塵法華小隱偃蓋著地卧清瑶傍渠走散入流觴臺轉若弄珠藪淙淙不知休還赴石鯨口灣澴合巨澗橫橋傍蒲柳來看暮春餘衆緑濃似酒摩挲蘇陳刻愈覺歲月久寺僧愛光㷔捧送貴侯有至今星散居各自開户牖自棄眠雲身誰傳釣月手夕陽令我歸為爾重搔首既離洞霄遇雨却寄道友凡骨何堪得再行渴心欲要謁通明驚聞竹樹連山雨疑有風雷㩧地聲鹿啖黃精知歲久人逢青箬便神清重來只要齊盂飯副似堂堂枸杞羮題曹武帝削瓜圖阿瞞瓜分姿見之垂髻中此心既弗乂此道安可洪漢祚既墜地餘子方困窮仁義儻自唱厯數豈不同挾令及宫閫殺士延奴童至今弔古徒哀痛殊未終實以已逼仄遂令彼長雄畫圖出後世略見經營工想其鼎峙勢亦天誘其衷此章弗徒歌聊以禆國風題蔡武伯所藏荆公硯獸面鼎足奔回𤣥中有潤澤比雨露當年曽出富國疏老子平生用心處帝謨商頌周六典刻畫聲形勞解詁至今文字與風騷一一相輝炫緗素如聞四海失枝梧可憾諸公缺調護誰令天乎遽如許可是石也能無預陳𤣥同歸蔣山路亦使高人野僧覷若為持入定林中應有明雲入天柱吾鄉風流蔡夫子匣而藏之美無度君不見公卿後進陸象山作祠堂記餘千言直欲百世俟聖賢惜哉不得銘此硯使我失意心惘然歸别墅幽棲久不到猿鶴擅藤蘿叢篠生將遍流泉咽更多鄰翁新釀熟野寺暮鐘和亦有經行者來觀依杖歌早起佛香才了換儒巾身是人間自在身一路野花清飬目半溝流水靜怡神雨宿山中留連如有情蕙帳極空明晚粥知泉味昏鐘度雨聲稍容鄰叟睡莫放曉猿驚剩欲剜苔蘚應當寫姓名再逰九溪昔年九溪十八澗今度見之逾清真靜依落落石路晚閒繞寂寂山家春可憐潺湲似留客更覺曲折能隨人得得杖藜來盡日野棠山杏亦精神偶題海氣江聲相與浮今時帝里舊杭州西湖寺裏多金碧自厭穠華不肯遊送人之官嚴陵如君風貌又精神自合拖紳近紫宸平地有心開洞穴十年無俸著閒身已看青舫垂垂去頃憶緋𫀆灔灔春若向𤣥英臺下過為言亦是學詩人與辨山道士飲采茗歸來日未斜更携苦菜入仙家後園同坐枯桐樹仰看紅桃落澗花不欺齊四首皆為陳將軍孫作陳兄榜名不欺齊不欺本自誠中來晚周洙泗漢伊雒中間此道寒如灰不欺齊中一樽酒兄乎此意差耐久真情往往到僮僕何况親知與朋友君不見湯脫胡桃一語失自是迂翁年少日陳兄再拜我事畢望雲亭淑氣槃槃接水原須臾鱗合更瀰漫自從蒿里無顔色來到鍾山有淚痕往者英雄俱雨絶後來哀痛欲河翻夜深月照長松下誰見孤飛出墓門敬思堂四言有亭央央髙丘之傍父兮母兮堅深埋藏厦屋凄凉宰木成行春秋蒸嘗酒漿牛羊身體俯傴雖勞弗彰心志瞀亂雖煩弗揚欲求幽隂茫茫洋洋兩間四方實繫我腸何以照之明神后皇凡今之人誰同慨傷陳將軍哀詞扞壞城兮保赤子歸王所兮執弓矢雖有妻子兮不如兄弟嗟全家兮南向而死護行殿兮卧旗鼓統伍符兮莫余侮故宫蕪兮孰為主哀將軍兮鬢垂素氣力絶兮委塵土後來孤童兮不勝惻楚天隂隂兮春寂寂曰余兄兮有廟食偕友于兮往作配駕鐡駟兮載雲斾山中人兮望余歸江鼯翔兮花亂飛弔青溪姑詞青溪之濆有小廟焉相傳以為溪神蔣子文之妹也旁二偶人陳叔寶宫人也癸酉歲或言有妖据之郡太守毁三像於溪中而犁其廟彼亡國妃嬪可棄也姑不可棄善惡無别而廢者古今不可勝數也何獨此哉因感之為弔詞曰投余兮緑波彼土偶兮奈何余魂兮無依余兄兮山阿兄靈兮甚雄青骨兮朱弓稱天兮訴余寃讒夫兮不終水仙廟鼓吹曲四首水奫淪兮不揚山嶔岑兮多巨石神來下􅍦舂仰昻神逺適王孫的咳神無亟兮倚碧櫨欵銅鋪德星在南烏尾逋兩峰隱天花深草蕍錢塘十餘萬户皆看史君歡娛雖涉流沙歷炎都入醫無閭不如東吳龍飛天門雞鳴日觀湖州有鶴知夜半端冕纓絳車施幰瞻彼孤山男呼女怨欲裂冕毁車春榮秋苦無翁愁豫雲冥冥雷闐闐橫玉轉流珠乾靈龜入我夢謂君當旋既窮海壖之炎天當飲山中之流泉招魂天孫召魂鬼伯催促千歲之淵不為谷巉嵓既刋松柏桓桓曰惟君之魂于兹考槃其永安君窆初成余以歸藏筮之蓋如此也嗚呼休哉方泉詩集卷四
