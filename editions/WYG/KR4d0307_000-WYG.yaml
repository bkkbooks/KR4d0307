body:
  text: 方泉詩集别集類三宋提要臣等謹案方泉詩集四巻宋周文璞撰文璞字晉仙號方泉又號山楹陽榖人與姜夔葛天民韓淲諸人同時集凡賦一巻詩三巻張端義貴耳集極稱其灌口二郎歌聽歐陽琴行金銅塔歌以為不减賀白然文璞古體長篇微病頽唐不出當時門徑端義擬以青蓮昌谷未免不倫至於古體短章近體小詩固可肩随於白石無懐澗泉諸集之間宜其迭相唱和也端義所稱灌口二郎歌集無此題惟四巻之首有瞿塘神君歌觀其詞意殆即所謂灌口二郎歌以名不雅馴改題歟乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:949e182d36ea88cfe2db4b331f1e1eb95c00a2cdf99a2cf436d3523223f477c3
