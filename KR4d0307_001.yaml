body:
  text: 方泉詩集卷一宋周文璞撰鍾山賦陟古阜兮逶遲望古鄉兮徘徊日忽忽兮欲下捈豫心兮訴哀昔王氣之初發有神人之稱孤逮溫雒之弗競亦中興於此都乃因融結以作鎮倚崔嵬而在東指牛首以立闕背龍盤而作宫後季嗣興規模屹隆張皇帝圖咨謀國工隂陽既調清寧亦同司馬岌嶪而引前太極穹窿而當中華林桂鼓璇室歌鐘矗丹楹兮暨暨森翠氛兮融融殿簿苑記密如魚鱗中納元氣仰規大辰將欲賔毳裘於九夷負黼扆於萬春攝提紀厯卷舒效珍回皇風於太初散靈雨於無垠及乎分代易姓滅沒變遷厚禍隱毒實生其間紫髯鼎來黃鬚載奔索蜜口苦辭鴆涕潸近奮身而倒戈亦反袂而張弮則見天衣畫章意貌孔武太白連蜷出渡江渚麗色登梯明雲鏡空愴舊艷新遄歸閟宫列事著幘誇戰負劔閣像未塵街首將變飲血擊賊舉烽燭夷戎鼓愔愔槥車纍纍受詔下令燒香諷詩妖祥昏淫廢興乖離傳之到今文字峻峭音節凄悲雖袵席之上岩石之下可聽可詠而不可思矣有如斯山則偃蹇干霄隱天蔽日雖涉世兮毋害蓋與時而出入哀園楸兮江楓旋灰飛兮雨泣殺祲纒郭晨暗夜明處子傷內老夫填坑匹馬羣死淫羊衡行豈曰作鎮而能忘情凡今齊民肯復記憶但能聨絡相命趣具酒食上蕭齋而膜拜撫漫碑而口嘖吉祝於蔣侯之廟遐眺於周顒之宅野芳敷蕍山嘯嗅嘀渺歸興兮亡盡畀興衰於戲劇嗟夫系緒悠逺條流煩貿若錫嘏於肥水兮亦嘗併力以扶救彼大勳之未集兮自賢庸之弗究緣義類以敶詞兮庶兹山之可弔方泉賦惟山居之嶔嵌兮有泉出而方窪彌歲年而沃泄兮雖苦寒而萌芽蓋隨區以賦形兮非浚土之所加吾初以道為澤兮以溥博而為家既自抱於潔清兮又含咀乎英華贊商易而非僣兮效坤輿而非夸摩大蛤非神竒兮出矩玉非矜誇雖使女盜冠而窺兮僕夫汲而盈車泉豈嗽以為貪兮方豈蹈而為邪將引竹以種樹兮放為池而漚麻順脈絡而襲水土兮則又豈退虎豹而進龍蛇噫吾命濡滯於此丘兮又何敢怨懟而舛差燃犀賦智者鑑物貴於察微後來不察其智幾希智以神為用神以智為友豈無其無而有其有庖犧女媧登龜斷蛇風氣既開淵流亡涯故巢居僒於仲舒表柱燼於張華若太真之事吾嘗以告諸徒矣博物者曰怪怪好竒者曰輕輕盡性者曰渾渾窮理者曰𡨕冥如此則溫子將不得為哲人子持賦於牛渚兩山之間老松古木倚而和之則庶幾乎敬聽投金瀨賦世之所謂英雄豪傑之倫常多罹於困厄方伍胥之遭憂兮寄微命於一食就嬋娟以訴哀兮乃鞠恭而進筥何衆人之未然兮遽見竒於女子女既餉胥又自咎兮沉厥軀而弗顧胥東行而入吳兮承君命而伐楚考鐘鼓以假道兮復過歷乎故處不見結褵正襟擊絮兮莎葦披靡乎極浦山空水暝無他人兮老嫗嘷呼乎后土咨諸人既弗乂兮質諸鬼兮無所捐美鎰於瀨中兮固取信於來者凛魂氣其安之兮為慈母而下取庶幾用此以全其老兮又足慰乎地下惟戰國之既衰兮士方賤乎犬彘弄人命以為寵榮兮雖妻子猶弗忌悵聖賢之不逢兮流遺恨於後世偉淑靈之好修兮視死生於一試故皇極之未建兮曰蹈道而則未閭閻笄珥而至此兮誠賢者之所喟吳既霸而胥稱忠兮伊若人之所遺後千嵗之悠悠兮有遺廟於故壘井邑改而經畫失兮桑柘鬱其薿薿屏蘭茝其弗歆兮矧昏淫與諂祭欽高風弗可企而將墜兮又秉節而不翽重曰投金於淵明胥志兮女曰未能愴恍填兮緬想髙風不見此兮石麟賦吁嗟麟兮爾所守者陳帝之墓風颯颯兮鳴松草霏霏兮泫露在昔鳬鍾振金龍輴載素域户肇開靈斿徑御侍女薦玉而長號侍臣抱弓而回顧凄聲竟天怨毒凝霧旦而視之惟爾麟兮髙而不屈曲而弗踞哀而不傷怨而不怒叶象製於圖籙謹工程於尺度千嵗而往若朝與莫陵柏秃而翁仲逃野棠發而狐兔度偉趾角之巋然獨巍巍其如故惟紫微之舒光絶巨筆於尼父父為爾而灑泣蓋自悼其弗遇豫有感於斯文乃斐然而稱賦亂曰噫人之生具五常其聰明者君而王頃刻之隔或聖狂雕題鑿齒方混茫天張義旗自晉陽蠻貊冠帶峩衣裳昭哉上帝開此祥千秋萬嵗立道傍吁嗟麟兮庸何傷黃連香賦余披五嶽之圖禮三茅之神莎服笋冠步行澗濵有老人者手持竒薰揚於嵓谷乃賦以文句曲之天華陽之山黑武蒼蝮各持籬藩爰有藥樹流膏滿身味苦氣厚獻於丘園有道所享不肖所儇世上齊民業流灣澴罔知紀極孰能遮攔爾惟昧昏能反其元當焚當燔上聞九關爾惟飛翾爾魂狙猿速往逐臭毋啓我垣絪緼輪囷化為明煙素皇泰尊實鑒我言欲盡其微祗以贅煩余方肅而聽俯而拾仰而不見但見石壁方泉詩集卷一
