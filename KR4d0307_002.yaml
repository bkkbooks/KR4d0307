body:
  text: 方泉詩集巻二宋周文璞撰臯橋伯鸞出京師慷慨歌五噫豈無濟時心升降與我違有來適吳中舂粱捄寒饑吳人臯伯通舍之慰窮棲方志雖或除此橋猶可稽伯鸞號逸民佳傳昭緑綈伯通賴有此庶幾與之齊至今閶門外兩冡陪要離纍纍各高大冥冥春草萋古者賢哲人不計鳯與雞焜燿亦偶爾埋没何凄兮出語賀兩公亦以昌吾詩堯章金銅佛塔歌白石招我入書齋使我速禮金塗塔我疑此塔非世有白石云是錢王禁中物上作如來捨身相饑鷹餓虎紛相向拈起靈山受記時龍天帝釋應惆悵形模逺自流沙至鑄出今回更精緻錢王納土歸京師流落多在西湖寺錢王本是英雄人白蓮花現國主身蛇鄉虎落狗脚朕何如紅袍玉𢃄稱功臣天封拆開即退聽兩浙不聞笳鼓競歸來佛子作䕶持太師尚父尚書令一枚傳到白石生生今但有能詩聲同袍秦外銛師兄哦詩禮塔作佛事同喫地爐山芋羮何曽薰陸綺床供但見相輪銅緑明哦詩禮塔猶未畢蘆葉低飛山雨濕初至長干寺雲杪熒熒一塔燈覺皇舍利寳烟凝山門推上三更月似照前朝禮拜僧囬次秣陵我行古井邑北風吹倒人旗店語簇簇石路聲轔鱗下車得少憇亭午聽司晨豈但田秔香更覺村醪醇懷哉厭王氣契濶毋重陳舊為秣陵尉今為鍾山神哦松夏夜雅頌聲流到楚詞更無人見獨㸔時池頭五粒初摇動却替幽人説舊時鷓鴣夜聞春雨來濃緑净於洗有禽自南翥自呼不得已豈非湘川下或自江左起黄陵見哀妃白下感遊子仍多憂其兄宛轉深樹裏汝兄今何在荆棘日靡靡豈非囚空山或已投逝水年深桎梏化波冷皮肉死鷓鴣謹弗痛此係造物理吾若破析言汝恨入骨髓風吹慈竹林苔暈上深紫吾亦念故鄉日夜夢鄰里不如各歸休闕月照西鄙懐何月湖星星鬢髪卧林丘詔使東川作郡侯髯叟望公來海嶠癭兵迎守去夔州珍圖想掛茅齋壁巧石應隨竹艇流教得巴童歌舞好侍郎千萬却歸休瀬上懐古有孟正曜祠堂古寺閟岑欝空梁懸齋魚神坐既欹仄徳容亦飢虚先生貧有命山僧樂無餘長安滿市花疋馬吟九衢寥寥北邙山而誰噫荒墟豈有先生者不如山僧歟盲風振苕華重露落芙蕖何當醉尉歸方坐釣水隅瀬上貞女祠估客征夫上野橋錦褵玉瑱亦蕭條人間多少乗除事到了英雄恨不消銅雀研君王有遺令婢子守空䑓遥望西陵下􅃮燈照鴆杯玉顏闕釵澤松柏生悲哀低吟短歌行想像姦雄才清泉沈金彩古烟凝紫灰零落故瓦在雕鐫若陶坯為人作書硏銅章出詼諧上下千載間流轉何悠哉那知墟中人天命不復來齊昏亦披猖増三築崔嵬年年漳河頭野棠如雪開丘慶餘畵兎家住棲賢雲泉石恣幽討冩出明視孫眉目増媚好夘日行踆踆衣褐坐芳草脱身文字禍見幾恨不早仰候月盈縮脩眉幾回掃迷離望靈藥青松為三倒山人書姓名欲使好事考夜坐讀書此生無耽嗜獨具愛書癖旁搜固未暇乍見亦畧識塵土苦見汙更苦官事逼紙燈既自剪竹牖仍僕織山邑少文獻有亦何自覔隨行五升瓻一歳無滴瀝向來長安市閲之嘗竟夕悵然夢裏去莽莽雲雨側哦此謂寒螿夜漏三十刻春雪崇禧仙舘似官居二月寒風峭有餘傲吏吟哦空峭下野童放散夜堂初熒熒宿火煨村酒煜煜殘燈鏡道書勿聽打忩聲更急快移銀礫上枯株鶴廟櫻桃花覆地古廟自青春帳裏還丹使山中採藥人風林嘷黑虎雲路列斑麟欲見神君面連朝禮北辰玉晨口占風鳴長史朝天柏草䕶仙翁瘞劍塋瑞象殿前亡馬跡養龍池上有鼃鳴華道士白胭脂蕭史水銀粉畨女紅藍花狂奴愛風調脂澤遂成家鏡開青峽月衣近赤城霞欲下人間世槲林棲晩鵶杜鵑花雲樹重重和淚吟故宫遺廟有知音秦吳萬里皆芳草染到山花恨最深新柳長條導幽情净色穿户牖酸風釅如醋少待濃似酒颭颭金絲垂滿眼遮老醜王道士庵出家纔二十小築契初心水浸籬根冷苔封井臼深狖啼天慘慘犬吠月隂隂又踞藜牀坐焚香鼓内琴南華陽洞稽首遊名山駕言入華陽南洞極秘怪松草泉水香曲几妙𨽻畫殘碣刋靈章俛首試一闚冷風襲綃裳守菴敬愛客暖我紫术湯遺我鵝眼錢云是洞所藏往有尋幽徒入見黄金墻侈心或已起㡬受竒鬼戕身儻獲㑹遇敢恨飛蓬霜更丐一片土小築安閒房朝披神芝圖暮試飢飯方金牛洞凌競下危梯俯傴入深穴回身避雲霧偃面眎日月藥苖䕶谽谺竹節截㠔嶭安知幽蹊下有此大竒絶金牛鏟光景仙牒尚可閲岡頭春已半枸杞如㸃血便恐顛風興横吹石崖裂山行行歌十首受籙壇前雲更長春風漠漠杏花香峯廽路轉無人處恰見天書字數行竦楶雕珉萬萬層雲頭晃晃現觚稜野人自愛深幽景只是尋常不見僧道院中間沐髪容施來元自賛皇公君能百拜香烟下不怕丹瓊路不通蟲蛀黄連徹夜焚秦謡楚誦少人聞近前欲問新宫信鹤𢃄靈芝入暮雲帶淺人家隠樹深嫩晴天色弄雲隂好風嫋嫋穿林去吹散松花似鬰金遨遊自是不思歸花氣蒸衣氣力微抛棄文書亡俗累嶺猿吟後閉山扉天風稳送歩虛聲雜和漫山檜栢鳴逺望山腰多白石細看知是野人行中峯道士蘂珠丹曽與神仙玉煉顏見説醉來燒隠訣藥爐蕭瑟卧空山紫陽道院古丹青恨渠猶畫化胡經晩香滅沒人歸後自有天風撼玉鈴砌穴蕭森隔土橋項梁城頌最蕭條羽衣歌此招䰟魄直送旛旗上九霄壬戌春日自從憂患長精神兀坐齋房過了春鑿落盞乾官燭暗摴蒱齒齓旅囊貧皇天老眼非塵世白日閒愁自替身一段風光好如畫未須全與路行人至荆公墓二首一丈荒墳上悠悠落日斜子孫來祭後守墓掃松花守法曽丞相能文陸左丞風流如未泯應作寺中僧又二首年少坐談𤣥鍾山直北邉春風吹夢過淚浥舊貂蟬野老從余話文公在半山蹇驢追不及落日寺深闗出白下南朝禁籞夕陽明猶與遊人作隊行烟滿天淵池上路菜花黄盡緑隂成遊栖霞四首破曉逗苦霧客鼻何酸辛山中氣候異初日如燭銀田間石獸多知是肉角麟古苔半皴腹化作蒼龜鱗兩柱既岌業衆碑亦嶙峋幽涂得竒觀未敢辭埃塵連年抱離憂百嗟亡一呻花委鬂毛晩草奪袍色春愁中書櫝失夢裏歌鐘敶窮愁著文字屢被同行嗔同行不相知而况悠悠人道中石麟碑柱甚夥其二吾與空門友相扶歴芳甸天機乆深妙梵本與貫穿徐馳得幽欣濟勝惬孤願宿芽發輕苞寒卉抱短艶鹿走風生林僧歸雲入殿寺從齊梁來諸彦題品遍安知千歳後未嘆陵谷變其三優尼製銅覺欲住女主齡主稱金輪王録在華嚴經而捨覺富貴愛慕塗椒馨月黯回心院妖䰟啼窈㝠僧人弗知此獨受一峰青分减倘及我終歳棲林坰其四府帖昨夕下許奉半月急遂作兹山遊惘怳憂思失古蹟堕榛莽乆乆失修葺南唐石塔好巋然對人立髙碣纒蛟龍竒畫耐風日明旦丹陽路萬感當畢集説與石翁婆皆須為余泣再如金陵再踏江東路詞窮不復論江泥沾苦淚津鼓聚歸䰟庾信因愁老陶潛為酒存孤踪雖落魄不敢望明恩道中望茅山有感危亭對名岳畢景扶鈎欄白鷺伺察過低昻若弓彎去歳負笈遊最佳元符間櫟林帶脩竹清𣲖流珊珊離留呌晝静洞天生春寒偉哉老宗師作室雲雨端竟為殺虫蟻不活升龍鸞遺體但觧蜕故宫亦燒殘今剏已半舊萬柱扶𤣥壇遂以兩不借一笻履㠝岏入宅問玉斧採芝投金環墨沼篆結字丹䑓氣成盤將謂便隠遁遽亦羅間關夷甫塵尾堕荀令香爐閒再拜望竒秀恍然神觀還如見大仙伯初髮緑映山兩君控鶴從俱著漢小冠俗累當復馳煑藥鼎欲翻病起冩懐夕陽蔽天涯望望不見家牛斗象緯微咄咄空咨嗟此時将細碎説與枝上花送友人入浙行至王冀公墓上小縣登樓上依稀是去年更闌吹短笛飲散覔歸韉丹葉標寒渡黄花羃野田重來弔古地為拊石羊肩轆轤體野人無事時嘗誦極𤣥詩冩遍千山寺吟行九曲溪誰為補天手同是决雲兒欲去無人問今宵醉似泥金陵懐古六首孫伯陵頭水最悲蒋侯廟下月來遲夜深行客心驚恐猿掛晋朝楓樹枝司馬家兒持酒杯天星亦下澆崔嵬當時若便效牛飲定有孟津師旅來愁㸔幕府夕陽邉那更雞籠在目前䟦扈飛揚只如此登臨那得不酸然杳杳舊蹤尋不得茫茫遺恨有誰窮長安敗績誰憐汝㶚上收聲未到公琵琶未盡使人嗟淚洒華林御苑花今日聞韶無處所鴈烟蛩雨属他家江水無情碧草春北朝留住老詞臣子規啼向青楓樹為爾離鄉去國人江南曲露下五原秋雨打三江愁齊梁才子多埋在青山頭其二郎與新歡濃儂與舊歡熟懊惱對行人當為歌艶曲其三孤舘聞啼鶯日暮胭脂薄芳醪似泥賤那得不行樂其四雨認巫山氣江通灧澦情相逢未多時秋花開古城吳中秋日郊原落葉已離離尚有孤花倚短籬小醉不成憐病後苦吟未了説愁時闘雞走狗袁絲喜臨水登山宋玉悲豆角已收無别事待同野老赴襟期野薔薇娟娟籬頭花白白間緑葉明光裁販袴不掩遊子屧餘春背人去乞與㺯芳蝶感我萬古心離離不相接我行田野間落魄何所挟猶能自撑拄使氣學漢俠悠哉芳草畔見此放逐妾羅帷未生夢粉面反成怯幽香薰倒人山麝火初熁長亭或相思如見玉蹀躞狼山吾母禱於山生我偃蹇身卅八始入寺所天俱不辰歸人復何之所願清戰塵勿復論啣鈎去作瑞世珍烏夜啼何人彈阮咸故故輕手摘彈作烏夜啼此意我所惻南朝有帝子作牧號侯伯著身疑嫌間生意日偪仄愛妾聞啼聲改鎮頒竹册故云長安吏性命在頃刻小婦聞啼聲赦令敷大澤身雖不肖甚㓜小著蒼幘再轉作縣佐欲塞父祖責濡墨决疑訟行誅慰寃魄羣凶見之怒極意便刳磔首沮𨽻陽橋公議亦已格痛掠及庫胥指作盗錢賊胥既僒椎鑿手堕面愈黑書欵自誣伏身竟遭刻畫酷毒一如斯誰謂彼無䇿謗書入外臺遂坐使者劾牽連入冶城五載窮惨礉敶詞呌穹旻哀痛人叵測若無磊落者誰肯為昭白翻思受禍時何但鎩羽翮愁寃傳里巷泣涕到臧獲嫠母偕妻孥惘惘望秋色豈料今日下置酒設豚拍聼此哀絲鳴但呼説不得月明客已去庭宇鳴啞啞世人見慈烏唾笑滿阡陌誰知事乗除禍去反為福蒼蒼上林枝當去作謝客贈趙子野歌與君雖為外兄弟語話尋常見肝肺自從不見半年餘每望吳雲輙流涕蘋溪松江同一波半年不見當奈何長安市上相尋處弟能起舞兄能歌兄今賜第南薫殿滿戴宫花上林晏弟歸便著随遊冠他時山中倘相見吳王臺畔楊柳黄吳姬對坐調絲簧阿兄自對吳雲坐呼弟不來應㫁腸書來不應寄他物只要秋林一雙笛當時蠻奴月下吹此時此夜須相憶古琴歌山人袖携古琴來形横拙醜腹破穿上兩金字亦殘漫自云得自十年前十年前宿野店間野店岑寂無炊烟只將百錢乞翁媪回買濕薪煨澗泉老翁持出一木段刀痕鑿痕斧痕滿秀才望見三嘆羡學琴以後何曽見此是成都雷氏為揩摩雷氏分明現持歸修治調曲成曲成他人不肯聞初彈羑里可釋憾再鼓廣陵如雪寃將歸古操次第傳龍入我舟何可憐憶昔憶昔在童初身輕俗累無雲霞明道服日月綴仙都屑玉三危露泥金一丈符遨遊即閶闔佩帶或昆吾學語闚眞誥談𤣥校易圖竹間時搏拊松下亦摴蒱謫堕歸嵓壑庸凡近僕奴極知方匿景何敢遽摶扶請命書盈紙祈眞淚迸珠但能覘帝座不恨守天厨譴巨知難逭心安敢自誣相随有芒屨還欲化雙鳬弔堯章相逢蕭寺已纍然自詠離騷講太𤣥極目舊遊猶白石傷心孤塜只蒼烟兒從外舍收殘藁客向空山泣㫁絃帝所修文與張樂魂兮應是到鈞天遣興望見山櫻媚短岑翻然便悔出家林壊車殺馬空嗟晩裂芰焚荷直到今筍蕨乆為歸去計雲烟無復舊來心平生最愛花濃澹看了斜陽看暝隂夜歸還山廹暮夜枕石唫下眠夢作童子日采花㺯寒泉囬身在人世欲去塵網纒永謝歡樂情把袂入紫烟送道友歸浮雲起足下是子欲歸家藏室収芸蠧丹房掃箭砂時聞搗藥鳥啼向欵冬花莫使山童去驚飛逐亂鵶黄龍洞一從負圖與負舟天公閟之居靈湫重瞳胼手乆不作蒼苔古木兩漠漠朝來石磴鱗鱗濕如覺蜿蜒為人出甘霖未甦焦巻多相候吳雲莫相失歸憇仁王寺重到招提未覺遲鉢單初副袷衣時僧房齋院門門閉梅子枇杷樹樹垂蟻䕃經幢求託化龍纒佛座學慈悲長年無事閒來此坐對空山諷小詩下竺静看唐人刻相連坐石隂鳥啼留客意果熟住山心野水流詩葉天香襲道林雲根有桂子應待月中尋七言雲竺前頭即御園小風斜雨入梅天放歌偃蹇如圓澤古貎昻藏若稚川尋得數行天寳字破愁一夜草堂眠此生更要窮經論惆悵高人舊石筵過葛天民新居為憶空山雨因嗟短鬂霜幅巾終日仄侍女古時妝烏臼殘林外丹砂舊井旁不留禅月畫只踞净名床湖鏡秋容淡雲荘曉露香汲泉須透脉種果便成行使鶴過村店携孥上野航極知秦外叟全似賀知章對佛稱居士翻經悟法王自將詩檢校猶與竹商量嗟我渾無頼非公不作狂莫移松下石老子要乗凉十月過鳯山舟回入項王祠用前韻墜葉濃於染孤花净似霜溪山如有待朱粉炫施妝勝境如天上雄鳴自帝旁工陳白玉琯人坐紫金床古兕稱春酒靈虬換夕香風筝猶有韻星弁忽分行念此鋤榛壟頻來渡葦航欲揮終極淚只廢苦吟章慨慷辭歡伯英雄憶憤王逝騅嗟弗及撞斗恨難量起舞何勞短行歌未要狂㫁雲將落日千古助哀凉送蜀客都市今重到文園更倦逰依依返窮峽得得上歸舟往事深能憶沈痾乆合瘳行經古祠廟應酹舊山丘梁父遺馨在降牋殺氣浮白衣猶肯出黄裏不包羞一聼巴人曲多貽漢璽憂花䝉塵漠漠苑抱水悠悠蠢爾狂童輩俱為滅族囚坤維元自正棧閣未應修管樂誰能並鄉雲亦可儔時哉著檮杌聊以畔牢愁硉矹重開險銷沉萬纍秋堂留石室畫歌尚竹枝謳寒蚻催逋客啼鵑識故侯屈沱甞角黍岷嶺㸔牽牛從此多談讌逢誰共勸酬近前持硯削成列抱箜篌近歳安樞相宣威在益州君歸如訪謁朝論必咨諏列聖方垂統羣公亦好修焚燒已郿塢誅殛盡驩兠虎豹参差束魑魖次第投衣冠通海嶠干羽格蠻陬江㓂何勞服淮田亦粗収旌旃仍使傳炮烙任兠鍪𤣥象摧天狗昌期控玉虬嗟嗟几上肉㫁㫁幄中籌貢錦資藩輔緘詞吿帝謀聲名與勳烈應逐漢江流戊辰感事二首乆要和平福須寛次第刑諸公善調壹熈祚必清寕夾道焚香拜今知病酒醒謾勞雙鬂白何止故山青妖緯朝沉彩非烟夜透扃願同臧獲列齊壽八千齡幕府才方盛軍師意最高何年燕巢木幾處馬騰槽馳騁心方壮指麾身更勞周詩歌勞徠費誓説逋逃行闕占風角穹廬拜羽旄飛騰眞有種淡泊正相遭山居書事荼䕷架倒無人架全似老夫狂醉時昨夜一畨溪雨横又漂苔蘚到花枝方泉詩集巻二
